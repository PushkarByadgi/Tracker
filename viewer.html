<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Track Vehicles</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: #0f1117;
    color: #e8e6df;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    padding: 14px 20px;
    background: #1a1d27;
    border-bottom: 1px solid #2a2d3a;
    display: flex;
    align-items: center;
    gap: 12px;
    z-index: 10;
  }
  header h1 { font-size: 16px; font-weight: 600; color: #f0ede6; }
  .live-badge {
    font-size: 11px;
    background: #22c55e18;
    color: #22c55e;
    border: 1px solid #22c55e44;
    border-radius: 20px;
    padding: 3px 10px;
    letter-spacing: 0.3px;
  }
  .count {
    margin-left: auto;
    font-size: 13px;
    color: #555;
  }
  #map { flex: 1; }

  /* Vehicle list panel */
  #panel {
    background: #1a1d27;
    border-top: 1px solid #2a2d3a;
    max-height: 180px;
    overflow-y: auto;
  }
  .vehicle-row {
    display: flex;
    align-items: center;
    padding: 10px 20px;
    border-bottom: 1px solid #1f2230;
    cursor: pointer;
    transition: background 0.15s;
  }
  .vehicle-row:hover { background: #1f2230; }
  .v-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #22c55e;
    margin-right: 12px;
    flex-shrink: 0;
  }
  .v-id { font-size: 14px; font-weight: 600; color: #e8e6df; }
  .v-time {
    margin-left: auto;
    font-size: 12px;
    color: #555;
  }
  .empty {
    padding: 20px;
    text-align: center;
    font-size: 13px;
    color: #444;
  }
</style>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body>

<header>
  <h1>Live Tracker</h1>
  <span class="live-badge">LIVE</span>
  <span class="count" id="countText">0 vehicles</span>
</header>

<div id="map"></div>
<div id="panel"><div class="empty" id="emptyMsg">Waiting for vehicles…</div></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  // ── PASTE YOUR FIREBASE CONFIG HERE ──────────────────────────────
  const firebaseConfig = {
    apiKey: "AIzaSyDCOYJvjvUEhqrDaa55p9aSa-KbZB_qlSk",
    authDomain: "tracker-fa9f5.firebaseapp.com",
    databaseURL: "https://tracker-fa9f5-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "tracker-fa9f5",
    storageBucket: "tracker-fa9f5.firebasestorage.app",
    messagingSenderId: "981774834565",
    appId: "1:981774834565:web:332a62d6de96d9239302ec"
  };
  // ─────────────────────────────────────────────────────────────────

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  // Map setup — default center India
  const map = L.map('map').setView([20.5937, 78.9629], 5);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '© OpenStreetMap © CartoDB',
    maxZoom: 19
  }).addTo(map);

  const markers = {};
  let firstLoad = true;

  function makeIcon(id) {
    return L.divIcon({
      className: '',
      html: `<div style="
        background:#4f6ef7;
        color:#fff;
        font-family:'DM Sans',sans-serif;
        font-size:12px;
        font-weight:600;
        padding:4px 10px;
        border-radius:20px;
        white-space:nowrap;
        border:2px solid #fff2;
        box-shadow:0 2px 8px #0008;
      ">${id}</div>`,
      iconAnchor: [0, 0]
    });
  }

  function timeAgo(ts) {
    if (!ts) return 'unknown';
    const secs = Math.floor((Date.now() - ts) / 1000);
    if (secs < 10) return 'just now';
    if (secs < 60) return `${secs}s ago`;
    return `${Math.floor(secs / 60)}m ago`;
  }

  function updatePanel(vehicles) {
    const panel = document.getElementById('panel');
    const empty = document.getElementById('emptyMsg');
    const ids = Object.keys(vehicles);

    document.getElementById('countText').textContent =
      ids.length === 0 ? '0 vehicles' : `${ids.length} vehicle${ids.length > 1 ? 's' : ''}`;

    if (ids.length === 0) {
      empty.style.display = 'block';
      // remove old rows
      panel.querySelectorAll('.vehicle-row').forEach(r => r.remove());
      return;
    }
    empty.style.display = 'none';

    // rebuild rows
    panel.querySelectorAll('.vehicle-row').forEach(r => r.remove());
    ids.forEach(id => {
      const v = vehicles[id];
      const row = document.createElement('div');
      row.className = 'vehicle-row';
      row.innerHTML = `
        <div class="v-dot"></div>
        <span class="v-id">${id}</span>
        <span class="v-time">${timeAgo(v.updatedAt)}</span>
      `;
      row.onclick = () => map.flyTo([v.lat, v.lng], 16, { duration: 1 });
      panel.appendChild(row);
    });
  }

  const vehicleData = {};

  onValue(ref(db, 'vehicles'), (snapshot) => {
    const data = snapshot.val() || {};

    // remove deleted vehicles
    Object.keys(vehicleData).forEach(id => {
      if (!data[id] && markers[id]) {
        map.removeLayer(markers[id]);
        delete markers[id];
        delete vehicleData[id];
      }
    });

    const latLngs = [];
    Object.entries(data).forEach(([id, v]) => {
      vehicleData[id] = v;
      latLngs.push([v.lat, v.lng]);

      if (markers[id]) {
        markers[id].setLatLng([v.lat, v.lng]);
      } else {
        markers[id] = L.marker([v.lat, v.lng], { icon: makeIcon(id) }).addTo(map);
      }
      markers[id].setIcon(makeIcon(id));
    });

    // fly to bounds on first data load
    if (firstLoad && latLngs.length > 0) {
      firstLoad = false;
      if (latLngs.length === 1) {
        map.flyTo(latLngs[0], 15, { duration: 1.5 });
      } else {
        map.flyToBounds(latLngs, { padding: [40, 40], duration: 1.5 });
      }
    }

    updatePanel(vehicleData);
  });

  // refresh timestamps every 10s
  setInterval(() => updatePanel(vehicleData), 10000);
</script>
</body>
</html>
